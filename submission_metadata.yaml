ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All scoring logic, weights, and honeypot detection designed by me.
  No candidate data fed to any LLM during ranking.

methodology_summary: |
  Two-phase ranking system. Offline: BGE-small-en-v1.5 embeddings 
  pre-computed for all 100K candidates and JD. Online: multi-signal 
  scoring combining semantic similarity (30%), title relevance (20%), 
  career evidence (15%), skills with trust multiplier (12%), experience 
  (10%), location (5%), education (3%), GitHub activity (5%). 
  Behavioral multiplier applied based on platform signals. 
  22K+ honeypots detected via internal consistency checks.
  Runtime: ~3 min CPU-only, no network.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
